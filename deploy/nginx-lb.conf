# KIA load balancer — fronts multiple python-api replicas.
# Use with docker-compose.scale.yml:
#   docker compose -f docker-compose.prod.yml -f docker-compose.scale.yml up -d --scale python-api=3
#
# Docker's embedded DNS resolves the service name to all replica IPs; nginx
# least-conn balances across them. max_fails drains dead replicas.

worker_processes auto;
events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=10s;  # Docker embedded DNS

    upstream kia_api {
        least_conn;
        server python-api:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # Per-IP rate limit at the LB tier (defense in depth with the CF Worker).
    limit_req_zone $binary_remote_addr zone=kia_rl:10m rate=120r/m;

    server {
        listen 8080;

        location /health {
            proxy_pass http://kia_api;
            proxy_connect_timeout 3s;
        }

        location / {
            limit_req zone=kia_rl burst=40 nodelay;
            proxy_pass http://kia_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;   # local model generations can be slow
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
