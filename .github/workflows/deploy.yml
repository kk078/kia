name: CI / Deploy to Cloudflare

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install Python deps
        working-directory: ./agents
        run: uv sync

      - name: Lint (ruff)
        working-directory: ./agents
        run: uv run ruff check .

      - name: Type check (mypy)
        working-directory: ./agents
        run: uv run mypy .

      - name: Unit tests
        working-directory: ./agents
        run: uv run pytest tests/unit -v

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build + test .NET gateway
        run: |
          dotnet build gateway/Gateway.sln
          dotnet test gateway/Gateway.sln

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install + build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./frontend
          command: pages deploy dist --project-name=kia --branch=main

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API-proxy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./worker
          command: deploy
        # Worker secrets (CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET) are set
        # once via `wrangler secret put` and persist across deploys.
