global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'python-api'
    static_configs:
      - targets: ['python-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'dotnet-gateway'
    static_configs:
      - targets: ['dotnet-gateway:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
